<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Sweepstake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-top">
                <span class="header-tag">FIFA World Cup 2026&trade;</span>
                <span class="header-updated" id="lastUpdated"></span>
            </div>
            <h1>Sweepstake</h1>
            <p class="header-hosts">
                <img src="https://flagcdn.com/w40/us.png" alt="" class="host-flag">
                <img src="https://flagcdn.com/w40/mx.png" alt="" class="host-flag">
                <img src="https://flagcdn.com/w40/ca.png" alt="" class="host-flag">
            </p>
        </div>
    </header>

    <nav>
        <div class="nav-inner">
            <button class="nav-btn active" data-tab="leaderboard">Leaderboard</button>
            <button class="nav-btn" data-tab="fixtures">Fixtures</button>
            <button class="nav-btn" data-tab="groups">Groups</button>
        </div>
    </nav>

    <main>
        <!-- LEADERBOARD TAB -->
        <section id="leaderboard" class="tab-content active">
            <div class="podium" id="podium"></div>
            <div class="card">
                <table id="leaderboardTable">
                    <thead>
                        <tr>
                            <th class="col-rank">#</th>
                            <th class="col-name">Participant</th>
                            <th class="col-team">Team</th>
                            <th class="col-num">Pts</th>
                            <th class="col-num">W</th>
                            <th class="col-num">D</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- FIXTURES TAB -->
        <section id="fixtures" class="tab-content">
            <div class="filter-bar">
                <select id="stageFilter">
                    <option value="all">All Stages</option>
                    <option value="group">Group Stage</option>
                    <option value="R32">Round of 32</option>
                    <option value="R16">Round of 16</option>
                    <option value="QF">Quarter-Finals</option>
                    <option value="SF">Semi-Finals</option>
                    <option value="3rd">3rd Place</option>
                    <option value="Final">Final</option>
                </select>
                <label class="toggle-label">
                    <input type="checkbox" id="showPlayedOnly">
                    <span>Played only</span>
                </label>
            </div>
            <div class="fixtures-list" id="fixturesList"></div>
        </section>

        <!-- GROUPS TAB -->
        <section id="groups" class="tab-content">
            <div class="groups-grid" id="groupsGrid"></div>
        </section>
    </main>

    <footer>
        <p>World Cup 2026 Sweepstake</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
