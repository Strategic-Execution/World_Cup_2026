<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Sweepstake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-pattern"></div>
    <header>
        <div class="header-content">
            <div class="tournament-badge">
                <span class="badge-year">2026</span>
            </div>
            <h1>FIFA World Cup Sweepstake</h1>
            <p class="subtitle">USA &bull; Mexico &bull; Canada</p>
            <p class="last-updated" id="lastUpdated"></p>
        </div>
    </header>

    <nav>
        <button class="nav-btn active" data-tab="leaderboard">
            <span class="nav-icon">🏆</span>
            <span class="nav-label">Leaderboard</span>
        </button>
        <button class="nav-btn" data-tab="fixtures">
            <span class="nav-icon">⚽</span>
            <span class="nav-label">Fixtures</span>
        </button>
        <button class="nav-btn" data-tab="groups">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Groups</span>
        </button>
    </nav>

    <main>
        <!-- LEADERBOARD TAB -->
        <section id="leaderboard" class="tab-content active">
            <div class="section-header">
                <h2>Sweepstake Standings</h2>
            </div>
            <div class="podium" id="podium"></div>
            <div class="table-container">
                <table id="leaderboardTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Participant</th>
                            <th>Team</th>
                            <th>Pts</th>
                            <th>W</th>
                            <th>D</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- FIXTURES TAB -->
        <section id="fixtures" class="tab-content">
            <div class="section-header">
                <h2>Match Results</h2>
            </div>
            <div class="filter-bar">
                <select id="stageFilter">
                    <option value="all">All Stages</option>
                    <option value="group">Group Stage</option>
                    <option value="R32">Round of 32</option>
                    <option value="R16">Round of 16</option>
                    <option value="QF">Quarter-Finals</option>
                    <option value="SF">Semi-Finals</option>
                    <option value="3rd">3rd Place</option>
                    <option value="Final">Final</option>
                </select>
                <label class="toggle-label">
                    <input type="checkbox" id="showPlayedOnly"> Played only
                </label>
            </div>
            <div class="fixtures-list" id="fixturesList"></div>
        </section>

        <!-- GROUPS TAB -->
        <section id="groups" class="tab-content">
            <div class="section-header">
                <h2>Group Standings</h2>
            </div>
            <div class="groups-grid" id="groupsGrid"></div>
        </section>
    </main>

    <footer>
        <p>FIFA World Cup 2026™ Sweepstake</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
