<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Sweepstake</title>
    <style>
:root {
    --primary: #1a1a2e;
    --secondary: #16213e;
    --accent: #e94560;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --text: #eaeaea;
    --text-muted: #8892b0;
    --border: #2d2d44;
    --win: #4caf50;
    --draw: #ff9800;
    --loss: #f44336;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    padding: 2rem;
    text-align: center;
    border-bottom: 3px solid var(--accent);
}

header h1 { font-size: 2rem; margin-bottom: 0.3rem; }
.last-updated { color: var(--text-muted); font-size: 0.85rem; }

nav {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 1rem;
    background: var(--secondary);
    position: sticky;
    top: 0;
    z-index: 100;
}

.nav-btn {
    background: transparent;
    border: 2px solid var(--border);
    color: var(--text-muted);
    padding: 0.6rem 1.5rem;
    border-radius: 2rem;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
}

.nav-btn:hover { border-color: var(--accent); color: var(--text); }
.nav-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* LEADERBOARD */
.podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 1rem;
    margin-bottom: 2rem;
    padding: 1rem;
}

.podium-card {
    text-align: center;
    padding: 1.5rem 1rem;
    border-radius: 1rem;
    background: var(--card);
    border: 2px solid var(--border);
    min-width: 140px;
}

.podium-card.gold { border-color: var(--gold); order: 2; transform: scale(1.1); }
.podium-card.silver { border-color: var(--silver); order: 1; }
.podium-card.bronze { border-color: var(--bronze); order: 3; }
.podium-rank { font-size: 2rem; margin-bottom: 0.3rem; }
.podium-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.2rem; }
.podium-team { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.podium-pts { font-size: 1.5rem; font-weight: 700; color: var(--accent); }

.table-container { overflow-x: auto; }

table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border-radius: 0.5rem;
    overflow: hidden;
}

thead th {
    background: var(--secondary);
    padding: 0.8rem 0.5rem;
    text-align: center;
    font-size: 0.8rem;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
}

thead th:nth-child(2), thead th:nth-child(3) { text-align: left; }

tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
}

tbody tr:hover { background: rgba(233, 69, 96, 0.05); }

tbody td {
    padding: 0.7rem 0.5rem;
    text-align: center;
    font-size: 0.9rem;
}

tbody td:nth-child(2), tbody td:nth-child(3) { text-align: left; }

.rank-cell { font-weight: 700; width: 40px; }
.rank-1 { color: var(--gold); }
.rank-2 { color: var(--silver); }
.rank-3 { color: var(--bronze); }

/* FIXTURES */
.filter-bar {
    display: flex;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
}

.filter-bar select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.9rem;
}

.toggle-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text-muted);
    font-size: 0.85rem;
    cursor: pointer;
}

.fixtures-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.fixture-card {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.8rem 1rem;
    gap: 0.5rem;
}

.fixture-card.played { border-left: 3px solid var(--accent); }
.fixture-home { text-align: right; font-weight: 500; }
.fixture-away { text-align: left; font-weight: 500; }

.fixture-score {
    text-align: center;
    font-weight: 700;
    font-size: 1.2rem;
    min-width: 70px;
    background: var(--secondary);
    padding: 0.3rem 0.8rem;
    border-radius: 0.3rem;
}

.fixture-score.pending {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 400;
}

.fixture-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
    grid-column: 1 / -1;
}

/* GROUPS */
.groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
}

.group-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    overflow: hidden;
}

.group-card h3 {
    padding: 0.7rem 1rem;
    background: var(--secondary);
    border-bottom: 2px solid var(--accent);
    font-size: 0.95rem;
}

.group-card table { border-radius: 0; }
.group-card thead th { font-size: 0.7rem; padding: 0.5rem 0.3rem; }
.group-card tbody td { font-size: 0.8rem; padding: 0.5rem 0.3rem; }
.qualified { background: rgba(76, 175, 80, 0.1); }

/* FOOTER */
footer {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    header h1 { font-size: 1.4rem; }
    .podium { flex-direction: column; align-items: center; }
    .podium-card.gold { order: 1; transform: none; }
    .podium-card.silver { order: 2; }
    .podium-card.bronze { order: 3; }
    nav { gap: 0.3rem; }
    .nav-btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
    .fixture-card { font-size: 0.85rem; }
}
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>&#9917; World Cup 2026 Sweepstake</h1>
            <p class="last-updated" id="lastUpdated"></p>
        </div>
    </header>

    <nav>
        <button class="nav-btn active" data-tab="leaderboard">&#127942; Leaderboard</button>
        <button class="nav-btn" data-tab="fixtures">&#128203; Fixtures</button>
        <button class="nav-btn" data-tab="groups">&#128202; Groups</button>
    </nav>

    <main>
        <!-- LEADERBOARD TAB -->
        <section id="leaderboard" class="tab-content active">
            <div class="podium" id="podium"></div>
            <div class="table-container">
                <table id="leaderboardTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Participant</th>
                            <th>Team</th>
                            <th>Pts</th>
                            <th>W</th>
                            <th>D</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- FIXTURES TAB -->
        <section id="fixtures" class="tab-content">
            <div class="filter-bar">
                <select id="stageFilter">
                    <option value="all">All Stages</option>
                    <option value="group">Group Stage</option>
                    <option value="R32">Round of 32</option>
                    <option value="R16">Round of 16</option>
                    <option value="QF">Quarter-Finals</option>
                    <option value="SF">Semi-Finals</option>
                    <option value="3rd">3rd Place</option>
                    <option value="Final">Final</option>
                </select>
                <label class="toggle-label">
                    <input type="checkbox" id="showPlayedOnly"> Played only
                </label>
            </div>
            <div class="fixtures-list" id="fixturesList"></div>
        </section>

        <!-- GROUPS TAB -->
        <section id="groups" class="tab-content">
            <div class="groups-grid" id="groupsGrid"></div>
        </section>
    </main>

    <footer>
        <p>FIFA World Cup 2026&#8482; Sweepstake &middot; Updated automatically from the master spreadsheet</p>
    </footer>

    <script>
// Data is injected here by the export script
/*__DATA_PLACEHOLDER__*/

(function() {
    if (typeof DATA === 'undefined') {
        document.querySelector('main').innerHTML =
            '<p style="text-align:center;padding:3rem;color:var(--text-muted)">No data available. Run <code>python export_to_web.py</code> to generate this file.</p>';
        return;
    }

    renderLastUpdated();
    renderLeaderboard();
    renderFixtures();
    renderGroups();
    setupNav();
    setupFilters();

    function setupNav() {
        document.querySelectorAll('.nav-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });
    }

    function renderLastUpdated() {
        document.getElementById('lastUpdated').textContent =
            DATA.lastUpdated ? 'Last updated: ' + DATA.lastUpdated : '';
    }

    function renderLeaderboard() {
        var lb = DATA.leaderboard;
        if (!lb || lb.length === 0) return;

        var podium = document.getElementById('podium');
        var medals = ['gold', 'silver', 'bronze'];
        var icons = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];

        podium.innerHTML = lb.slice(0, 3).map(function(e, i) {
            return '<div class="podium-card ' + medals[i] + '">' +
                '<div class="podium-rank">' + icons[i] + '</div>' +
                '<div class="podium-name">' + escapeHtml(e.participant) + '</div>' +
                '<div class="podium-team">' + escapeHtml(e.team) + '</div>' +
                '<div class="podium-pts">' + e.points + ' pts</div>' +
            '</div>';
        }).join('');

        var tbody = document.querySelector('#leaderboardTable tbody');
        tbody.innerHTML = lb.map(function(e) {
            return '<tr>' +
                '<td class="rank-cell rank-' + (e.rank <= 3 ? e.rank : '') + '">' + e.rank + '</td>' +
                '<td>' + escapeHtml(e.participant) + '</td>' +
                '<td>' + escapeHtml(e.team) + '</td>' +
                '<td><strong>' + e.points + '</strong></td>' +
                '<td>' + e.wins + '</td>' +
                '<td>' + e.draws + '</td>' +
            '</tr>';
        }).join('');
    }

    function renderFixtures(stageFilter, playedOnly) {
        stageFilter = stageFilter || 'all';
        playedOnly = playedOnly || false;
        var container = document.getElementById('fixturesList');
        var fixtures = DATA.fixtures.slice();

        if (stageFilter === 'group') {
            fixtures = fixtures.filter(function(f) { return f.stage.length === 1; });
        } else if (stageFilter !== 'all') {
            fixtures = fixtures.filter(function(f) { return f.stage === stageFilter; });
        }

        if (playedOnly) {
            fixtures = fixtures.filter(function(f) { return f.homeScore !== null; });
        }

        container.innerHTML = fixtures.map(function(f) {
            var played = f.homeScore !== null;
            var scoreText = played ? f.homeScore + ' - ' + f.awayScore : (f.date || 'TBD');

            return '<div class="fixture-card ' + (played ? 'played' : '') + '">' +
                '<div class="fixture-home">' + escapeHtml(f.home) + '</div>' +
                '<div class="fixture-score ' + (played ? '' : 'pending') + '">' + scoreText + '</div>' +
                '<div class="fixture-away">' + escapeHtml(f.away) + '</div>' +
                '<div class="fixture-meta">' +
                    '<span>Match ' + f.match + '</span>' +
                    '<span>' + f.date + ' &middot; ' + formatStage(f.stage) + '</span>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    function setupFilters() {
        var stageSelect = document.getElementById('stageFilter');
        var playedCheck = document.getElementById('showPlayedOnly');
        stageSelect.addEventListener('change', function() {
            renderFixtures(stageSelect.value, playedCheck.checked);
        });
        playedCheck.addEventListener('change', function() {
            renderFixtures(stageSelect.value, playedCheck.checked);
        });
    }

    function formatStage(stage) {
        if (stage.length === 1) return 'Group ' + stage;
        var map = { R32: 'Round of 32', R16: 'Round of 16', QF: 'Quarter-Final', SF: 'Semi-Final', '3rd': '3rd Place', Final: 'Final' };
        return map[stage] || stage;
    }

    function renderGroups() {
        var groups = DATA.groups;
        if (!groups || Object.keys(groups).length === 0) return;

        var grid = document.getElementById('groupsGrid');
        var sortedKeys = Object.keys(groups).sort();

        grid.innerHTML = sortedKeys.map(function(g) {
            var teams = groups[g];
            var rows = teams.map(function(t, i) {
                return '<tr class="' + (i < 2 ? 'qualified' : '') + '">' +
                    '<td style="text-align:left">' + escapeHtml(t.team) + '</td>' +
                    '<td>' + t.p + '</td>' +
                    '<td>' + t.w + '</td>' +
                    '<td>' + t.d + '</td>' +
                    '<td>' + t.l + '</td>' +
                    '<td>' + t.gf + '</td>' +
                    '<td>' + t.ga + '</td>' +
                    '<td>' + (t.gf - t.ga) + '</td>' +
                    '<td><strong>' + t.pts + '</strong></td>' +
                '</tr>';
            }).join('');

            return '<div class="group-card">' +
                '<h3>Group ' + g + '</h3>' +
                '<table>' +
                    '<thead><tr>' +
                        '<th style="text-align:left">Team</th>' +
                        '<th>P</th><th>W</th><th>D</th><th>L</th>' +
                        '<th>GF</th><th>GA</th><th>GD</th><th>Pts</th>' +
                    '</tr></thead>' +
                    '<tbody>' + rows + '</tbody>' +
                '</table>' +
            '</div>';
        }).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
})();
    </script>
</body>
</html>
